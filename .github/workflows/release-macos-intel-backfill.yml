name: macOS Intel Backfill (one-shot)

# One-shot workflow to backfill macOS Intel DMG + PKG artifacts onto an
# EXISTING release that shipped without them (v0.3.1 is the only such
# release: Intel was dropped during Phase 3N shakedown 2026-04-12 and is
# being restored as a follow-up). Does NOT delete or modify the existing
# release; uses `gh release upload` (not `create`) to add the new files
# alongside what's already there. Updates SHA256SUMS.txt + .asc to keep
# the central manifest cohesive.
#
# Delete this file in a follow-up commit after successful backfill — it
# is not part of the regular release pipeline.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to backfill (e.g. v0.3.1)'
        required: true
  # Same auto-fire pattern as the throwaway shakedown: GHA's
  # workflow_dispatch via API/CLI requires the workflow file to exist on
  # the default branch first, which blocks running this from a feature
  # branch. A paths-filtered push trigger on this branch fires the
  # workflow on commits that touch this file (and only this file). When
  # the file is deleted in the post-backfill cleanup commit, this
  # trigger goes away with it. Hardcodes 'v0.3.1' as the tag because
  # workflow_dispatch inputs are not available on `push` events; the
  # workflow_dispatch path remains the supported way to backfill other
  # tags if ever needed.
  push:
    branches: ['claude/sweet-euclid-18d4fe']
    paths: ['.github/workflows/release-macos-intel-backfill.yml']

permissions:
  contents: write  # needed for `gh release upload` and edit

jobs:
  backfill-macos-intel:
    runs-on: macos-15
    env:
      ARCH: x86_64
      DMG_SUFFIX: macOS-intel
      DEPLOYMENT_TARGET: "11.0"
      HAS_APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID != '' }}
      # Resolved once at job-start. workflow_dispatch passes a `tag`
      # input; push events don't have inputs so they default to the
      # only release that needs backfilling (v0.3.1). Used everywhere
      # below in place of github.event.inputs.tag.
      TARGET_TAG: ${{ github.event.inputs.tag || 'v0.3.1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_TAG }}

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ env.TARGET_TAG }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match vMAJOR.MINOR.PATCH[-suffix]"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Backfilling Intel artifacts onto release: $TAG (version $VERSION)"

      - name: Verify release exists and is not a draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATE=$(gh release view "${{ env.TARGET_TAG }}" --json isDraft,name -q '.isDraft')
          if [ "$STATE" = "true" ]; then
            echo "::error::Release ${{ env.TARGET_TAG }} is a draft. Backfill operates on published releases only."
            exit 1
          fi
          echo "✓ Release ${{ env.TARGET_TAG }} is published"

      - name: Patch v0.3.1 sources for cross-compile + PKG suffix
        run: |
          # v0.3.1 shipped before two helpers landed in the cross-compile
          # PR. Apply them here as workflow-local source patches so the
          # build path mirrors what release.yml does for future releases.
          # The v0.3.1 tag itself is untouched.
          #
          # 1. setup-deepfilter.sh: honour NEREUS_TARGET_ARCH so cargo
          #    cbuild --target x86_64-apple-darwin runs from arm64 host.
          # 2. packaging/macos/hal-installer.sh: honour PKG_SUFFIX so the
          #    output PKG name matches the notarize/staple/upload paths
          #    below (NereusSDR-0.3.1-macOS-intel.pkg, not the historical
          #    NereusSDR-0.3.1-macOS.pkg which would collide with the
          #    existing arm64 PKG already on the v0.3.1 release).
          sed -i.bak 's|^ARCH=\$(uname -m)$|ARCH="${NEREUS_TARGET_ARCH:-$(uname -m)}"|' setup-deepfilter.sh
          rm -f setup-deepfilter.sh.bak
          grep -q 'NEREUS_TARGET_ARCH' setup-deepfilter.sh || {
            echo "::error::setup-deepfilter.sh patch did not land"
            head -25 setup-deepfilter.sh
            exit 1
          }

          sed -i.bak 's|\${VERSION}-macOS\.pkg|\${VERSION}-${PKG_SUFFIX:-macOS}.pkg|g' packaging/macos/hal-installer.sh
          rm -f packaging/macos/hal-installer.sh.bak
          grep -q 'PKG_SUFFIX:-macOS' packaging/macos/hal-installer.sh || {
            echo "::error::hal-installer.sh patch did not land"
            grep -n 'macOS' packaging/macos/hal-installer.sh | head
            exit 1
          }

          echo "✓ Both source patches applied"

      - name: Install non-Qt brew packages
        run: brew install ninja create-dmg ccache

      - name: Install Qt 6.8 for x86_64 macOS via aqtinstall
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia qtshadertools'
          cache: true

      - name: Build FFTW from source for x86_64 (both precisions)
        run: |
          PREFIX="${{ github.workspace }}/fftw-x86_64"
          CFLAGS="-arch x86_64 -mmacosx-version-min=${{ env.DEPLOYMENT_TARGET }}"
          curl -fsSL https://fftw.org/pub/fftw/fftw-3.3.10.tar.gz -o fftw.tar.gz
          tar xzf fftw.tar.gz
          cd fftw-3.3.10
          ./configure --enable-shared --disable-doc \
            --prefix="$PREFIX" CFLAGS="$CFLAGS" --host=x86_64-apple-darwin
          make -j$(sysctl -n hw.ncpu) && make install && make distclean
          ./configure --enable-single --enable-shared --disable-doc \
            --prefix="$PREFIX" CFLAGS="$CFLAGS" --host=x86_64-apple-darwin
          make -j$(sysctl -n hw.ncpu) && make install
          test -f "$PREFIX/include/fftw3.h"            || { echo "::error::fftw3.h not installed"; exit 1; }
          test -f "$PREFIX/lib/libfftw3.dylib"         || { echo "::error::libfftw3 not installed"; exit 1; }
          test -f "$PREFIX/lib/libfftw3f.dylib"        || { echo "::error::libfftw3f not installed"; exit 1; }

      - name: Install Rust toolchain with x86_64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      # Apple Developer ID cert import — copied from release.yml. Gated on
      # the secret being present; without it the backfill produces only
      # ad-hoc-signed artifacts that cannot be notarized (the workflow
      # will fail at notarize time, which is correct — backfill artifacts
      # MUST be notarized to match the existing release's signed artifacts).
      - name: Import Apple certs
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          P12_PATH="$RUNNER_TEMP/certs.p12"
          echo -n "$APPLE_CERT_P12_BASE64" | base64 --decode > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm "$P12_PATH"

      - name: Set up DeepFilterNet3 library (cross-compile to x86_64)
        env:
          NEREUS_TARGET_ARCH: x86_64
        run: bash setup-deepfilter.sh

      - name: Configure
        run: |
          FFTW_PREFIX="${{ github.workspace }}/fftw-x86_64"
          export PKG_CONFIG_PATH="$FFTW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export LDFLAGS="-L$FFTW_PREFIX/lib $LDFLAGS"
          ccache --max-size=2G
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ env.DEPLOYMENT_TARGET }}" \
            -DCMAKE_OSX_ARCHITECTURES="${{ env.ARCH }}" \
            -DCMAKE_PREFIX_PATH="$FFTW_PREFIX" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test (via Rosetta)
        working-directory: build
        run: ctest --output-on-failure --no-tests=ignore

      - name: Bundle Qt frameworks
        run: |
          "$QT_ROOT_DIR/bin/macdeployqt" build/NereusSDR.app \
            -verbose=1 -always-overwrite

      - name: Copy license notices into app bundle
        run: |
          mkdir -p build/NereusSDR.app/Contents/Resources/licenses
          cp -r packaging/third-party-licenses/. build/NereusSDR.app/Contents/Resources/licenses/
          cp LICENSE LICENSE-DUAL-LICENSING build/NereusSDR.app/Contents/Resources/licenses/
          mkdir -p build/NereusSDR.app/Contents/Resources/licenses/deepfilter
          cp third_party/deepfilter/LICENSE       build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          cp third_party/deepfilter/LICENSE-APACHE build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          cp third_party/deepfilter/LICENSE-MIT   build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          cp third_party/deepfilter/COMMIT        build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          mkdir -p build/NereusSDR.app/Contents/Resources/licenses/rnnoise
          cp third_party/rnnoise/LICENSE          build/NereusSDR.app/Contents/Resources/licenses/rnnoise/

      - name: Bundle models into app bundle
        run: |
          mkdir -p build/NereusSDR.app/Contents/Resources/models/rnnoise
          cp third_party/rnnoise/models/Default_large.bin  build/NereusSDR.app/Contents/Resources/models/rnnoise/
          cp third_party/rnnoise/models/Default_small.bin  build/NereusSDR.app/Contents/Resources/models/rnnoise/
          mkdir -p build/NereusSDR.app/Contents/Resources/models/dfnet3
          cp third_party/deepfilter/models/DeepFilterNet3_onnx.tar.gz build/NereusSDR.app/Contents/Resources/models/dfnet3/

      - name: Codesign app
        run: |
          if [ "$HAS_APPLE_DEVELOPER_ID" = "true" ]; then
            codesign --force --deep --options runtime --timestamp \
              --entitlements packaging/macos/app-entitlements.plist \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              build/NereusSDR.app
          else
            codesign --force --deep --sign - build/NereusSDR.app
          fi
          codesign --verify --verbose=2 build/NereusSDR.app

      - name: Build HAL plugin
        run: |
          cmake -B build-hal -S hal-plugin -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="${{ env.ARCH }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ env.DEPLOYMENT_TARGET }}"
          cmake --build build-hal

      - name: Sign HAL plugin
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements packaging/macos/hal-entitlements.plist \
            --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
            build-hal/NereusSDRVAX.driver

      - name: Build .pkg
        env:
          APPLE_INSTALLER_ID: ${{ secrets.APPLE_INSTALLER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
          PKG_SUFFIX: macOS-intel
        run: bash packaging/macos/hal-installer.sh

      - name: Notarize .pkg
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          xcrun notarytool submit \
            "build/NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.pkg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --wait

      - name: Staple .pkg
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          xcrun stapler staple \
            "build/NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.pkg"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "NereusSDR" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "NereusSDR.app" 150 110 \
            --hide-extension "NereusSDR.app" \
            --app-drop-link 450 110 \
            "NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.dmg" \
            "build/NereusSDR.app" \
          || true
          ls -la NereusSDR-*.dmg

      - name: Codesign DMG
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          codesign --force --timestamp \
            --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
            "NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.dmg"

      - name: Notarize DMG
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          xcrun notarytool submit \
            "NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --wait

      - name: Staple DMG
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          xcrun stapler staple \
            "NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.dmg"

      - name: Stage artifacts for upload
        run: |
          mkdir -p backfill-artifacts
          cp "build/NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.pkg" backfill-artifacts/
          cp "NereusSDR-${{ steps.version.outputs.version }}-macOS-intel.dmg" backfill-artifacts/
          ls -la backfill-artifacts/

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # macOS runners ship GPG via brew (gnupg). Verify it's available.
          which gpg || brew install gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_FP=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/ {print $10; exit}')
          echo "${KEY_FP}:6:" | gpg --import-ownertrust
          gpg --list-secret-keys

      - name: GPG-sign Intel artifacts
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        working-directory: backfill-artifacts
        run: |
          for f in *.pkg *.dmg; do
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --detach-sign --armor "$f"
          done
          ls -la

      - name: Upload Intel artifacts to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: backfill-artifacts
        run: |
          # Upload Intel artifacts FIRST so that if SHA256SUMS update
          # fails, the artifacts are present and the manifest can be
          # patched manually. `gh release upload` is fine to re-run with
          # --clobber if a partial run leaves duplicates.
          TAG="${{ env.TARGET_TAG }}"
          gh release upload "$TAG" *.pkg *.pkg.asc *.dmg *.dmg.asc

      - name: Update SHA256SUMS.txt to include Intel artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Download the existing SHA256SUMS.txt + .asc, append SHA lines
          # for the new Intel artifacts (sorted), re-sign, then clobber
          # both files on the release. Preserves existing rows verbatim.
          # Note: re-signing changes the .asc signature, so anyone who
          # previously cached SHA256SUMS.txt + .asc will see the file
          # change. This is the trade-off for keeping the manifest
          # complete; documented in the release notes addendum.
          TAG="${{ env.TARGET_TAG }}"
          mkdir -p sums-update
          cd sums-update
          gh release download "$TAG" -p 'SHA256SUMS.txt' -p 'SHA256SUMS.txt.asc'
          (cd ../backfill-artifacts && sha256sum *.pkg *.dmg) >> SHA256SUMS.txt
          # Sort by filename so ordering is deterministic + readable
          sort -k 2 SHA256SUMS.txt > SHA256SUMS.txt.sorted
          mv SHA256SUMS.txt.sorted SHA256SUMS.txt
          echo "----- updated SHA256SUMS.txt -----"
          cat SHA256SUMS.txt
          rm SHA256SUMS.txt.asc
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor SHA256SUMS.txt
          gh release upload "$TAG" \
            SHA256SUMS.txt SHA256SUMS.txt.asc --clobber

      - name: List final release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "----- final asset list on release ${{ env.TARGET_TAG }} -----"
          gh release view "${{ env.TARGET_TAG }}" --json assets --jq '.assets[].name' | sort

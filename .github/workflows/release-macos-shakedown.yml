name: Release macOS Shakedown (throwaway, Option 2)

# Pivoted from Option 1 (native macos-13) to Option 2 (cross-compile
# x86_64 from macos-15 via aqtinstall). The macos-13 runner pool is
# scarce as Apple deprecates Intel CI; cross-compile from the abundant
# Apple Silicon runner is the runner-independent path. Workflow_dispatch
# only (plus a paths-filtered push trigger so GHA actually runs it from
# a non-default branch). Deleted in Stage B of the same PR.

on:
  workflow_dispatch:
  # Temporary push trigger keyed to this throwaway branch so GHA actually
  # fires the workflow without requiring it to be merged to main first
  # (workflow_dispatch via API/CLI requires the workflow file to exist on
  # the default branch). Removed when the file is deleted in Stage B.
  push:
    branches: ['claude/sweet-euclid-18d4fe']
    paths: ['.github/workflows/release-macos-shakedown.yml']

permissions:
  contents: read

jobs:
  shakedown-macos-intel-crosscompile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: x86_64
            deployment_target: "11.0"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify runner identity + Rosetta presence
        run: |
          echo "Runner: ${{ matrix.runner }}"
          echo "Host arch: $(uname -m)"
          echo "macOS version: $(sw_vers -productVersion)"
          echo "Xcode: $(xcodebuild -version 2>&1 | head -1)"
          if /usr/bin/arch -x86_64 /usr/bin/true 2>/dev/null; then
            echo "✓ Rosetta is available — x86_64 binaries can run for ctest"
            echo "ROSETTA_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "::warning::Rosetta NOT present on runner — ctest will be skipped"
            echo "ROSETTA_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Install non-Qt brew packages
        run: brew install ninja create-dmg ccache

      - name: Install Qt 6.8 for macOS via aqtinstall
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia qtshadertools'
          cache: true

      - name: Build FFTW from source for x86_64
        run: |
          curl -fsSL https://fftw.org/pub/fftw/fftw-3.3.10.tar.gz -o fftw.tar.gz
          tar xzf fftw.tar.gz
          cd fftw-3.3.10
          ./configure --enable-single --enable-shared --disable-doc \
            --prefix="${{ github.workspace }}/fftw-x86_64" \
            CFLAGS="-arch x86_64 -mmacosx-version-min=11.0" \
            --host=x86_64-apple-darwin
          make -j$(sysctl -n hw.ncpu)
          make install
          ls -la "${{ github.workspace }}/fftw-x86_64/lib/"

      - name: Install Rust toolchain with x86_64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Set up DeepFilterNet3 library (cross-compile to x86_64)
        env:
          NEREUS_TARGET_ARCH: x86_64
        run: bash setup-deepfilter.sh

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ matrix.deployment_target }}" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/fftw-x86_64"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test (via Rosetta if available)
        working-directory: build
        run: |
          if [ "$ROSETTA_AVAILABLE" = "true" ]; then
            ctest --output-on-failure --no-tests=ignore
          else
            echo "::warning::Skipping ctest — Rosetta not present on runner"
          fi

      - name: Verify built binary is x86_64
        run: |
          BIN_PATH=build/NereusSDR.app/Contents/MacOS/NereusSDR
          if [ ! -f "$BIN_PATH" ]; then
            echo "::error::$BIN_PATH not found"
            exit 1
          fi
          FILE_OUTPUT=$(file "$BIN_PATH")
          echo "$FILE_OUTPUT"
          if ! echo "$FILE_OUTPUT" | grep -q "Mach-O 64-bit executable x86_64"; then
            echo "::error::Binary is NOT x86_64. Got: $FILE_OUTPUT"
            exit 1
          fi
          echo "✓ Binary confirmed x86_64"

      - name: Upload .app artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: shakedown-macos-intel-crosscompile-app
          path: build/NereusSDR.app
          retention-days: 3
